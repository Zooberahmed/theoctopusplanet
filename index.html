<link href="https://fonts.googleapis.com/css2?family=Bangers&family=Comic+Neue:ital,wght@0,400;0,700;1,400&family=Patrick+Hand&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#F7EED6; --ink:#161310;
    --blue:#2C5FCF; --red:#E63A29; --yellow:#FFD23F;
    --teal:#1FA89B; --purple:#8E6FE0; --green:#5CB84E; --pink:#F58CB5;
    --shadow:6px 6px 0 var(--ink);
    --disp:'Bangers', system-ui, cursive;
    --hand:'Patrick Hand', 'Comic Neue', cursive;
    --body:'Comic Neue', system-ui, sans-serif;
  }
  *{box-sizing:border-box;}
  html{scroll-behavior:smooth;}
  body{
    margin:0;color:var(--ink);font-family:var(--body);font-size:17px;line-height:1.5;
    background-color:var(--paper);
    background-image:radial-gradient(var(--ink) 1px, transparent 1.4px);
    background-size:22px 22px;background-attachment:fixed;
    -webkit-font-smoothing:antialiased;overflow-x:hidden;
  }
  body::before{content:"";position:fixed;inset:0;background:var(--paper);opacity:.86;z-index:-1;}
  a{color:inherit;text-decoration:none;}
  ::selection{background:var(--yellow);}
  :focus-visible{outline:3px solid var(--blue);outline-offset:3px;}
  svg{display:block;}
  .char{stroke:var(--ink);}

  .wrap{position:relative;z-index:1;max-width:1000px;margin:0 auto;padding:0 20px;}

  /* ===== panel primitive ===== */
  .panel{background:var(--paper);border:4px solid var(--ink);box-shadow:var(--shadow);}

  /* ===== top bar ===== */
  .bar{position:relative;z-index:5;max-width:1000px;margin:14px auto 0;padding:10px 16px;
    display:flex;align-items:center;justify-content:space-between;gap:10px;
    background:var(--ink);border-radius:4px;}
  .brand{display:flex;align-items:center;gap:10px;color:var(--paper);}
  .brand svg{width:34px;height:34px;}
  .brand b{font-family:var(--disp);font-size:24px;letter-spacing:1.5px;}
  .nav{display:flex;gap:8px;flex-wrap:wrap;}
  .nav a{font-family:var(--disp);font-size:18px;letter-spacing:1px;color:var(--ink);
    background:var(--yellow);border:2px solid var(--paper);padding:3px 12px;border-radius:3px;transition:transform .1s;}
  .nav a:hover,.nav a.on{background:var(--red);color:var(--paper);transform:rotate(-2deg) scale(1.05);}

  #view{min-height:60vh;padding-bottom:30px;}

  /* ===== comic cover hero ===== */
  .cover{position:relative;margin:22px 0 0;padding:30px 24px 26px;border:5px solid var(--ink);
    box-shadow:9px 9px 0 var(--ink);background:var(--blue);overflow:hidden;}
  .cover .halft{position:absolute;inset:0;opacity:.18;
    background-image:radial-gradient(#fff 2px,transparent 2.5px);background-size:14px 14px;pointer-events:none;}
  .issue{position:absolute;top:-2px;left:18px;background:var(--red);color:var(--paper);
    font-family:var(--disp);font-size:20px;letter-spacing:1px;padding:7px 14px 5px;border:3px solid var(--ink);
    border-top:none;box-shadow:3px 3px 0 var(--ink);}
  .price{position:absolute;top:14px;right:14px;background:var(--yellow);border:3px solid var(--ink);
    border-radius:50%;width:96px;height:96px;display:flex;align-items:center;justify-content:center;text-align:center;
    transform:rotate(12deg);box-shadow:3px 3px 0 var(--ink);font-family:var(--hand);font-weight:700;font-size:13px;line-height:1.05;padding:6px;}
  .cover-title{position:relative;text-align:center;margin:26px 0 0;}
  .cover-title h1{font-family:var(--disp);margin:0;line-height:.82;letter-spacing:2px;
    font-size:clamp(54px,13vw,128px);color:var(--yellow);
    -webkit-text-stroke:3px var(--ink);paint-order:stroke fill;
    text-shadow:6px 6px 0 var(--ink);}
  .cover-sub{position:relative;text-align:center;margin:18px auto 0;display:inline-block;left:50%;transform:translateX(-50%);
    background:var(--ink);color:var(--paper);font-family:var(--hand);font-size:18px;padding:6px 18px;border-radius:30px;}
  .cover-scene{position:relative;display:flex;align-items:flex-end;justify-content:center;gap:10px;margin:20px 0 0;}
  .cover-scene svg{width:clamp(110px,26vw,190px);height:clamp(110px,26vw,190px);
    filter:drop-shadow(4px 4px 0 rgba(0,0,0,.35));}
  .vs{font-family:var(--disp);font-size:clamp(40px,8vw,72px);color:var(--paper);
    -webkit-text-stroke:2px var(--ink);align-self:center;transform:rotate(-8deg);}
  .blurb-burst{position:absolute;bottom:6px;right:-6px;z-index:3;background:var(--yellow);
    color:var(--ink);font-family:var(--disp);font-size:16px;letter-spacing:.5px;text-align:center;line-height:1;
    width:124px;height:124px;display:flex;align-items:center;justify-content:center;padding:18px;transform:rotate(10deg);
    clip-path:polygon(50% 0,61% 22%,89% 13%,79% 39%,100% 50%,79% 61%,89% 87%,61% 78%,50% 100%,39% 78%,11% 87%,21% 61%,0 50%,21% 39%,11% 13%,39% 22%);
    border:0;}

  /* ===== origin / premise box ===== */
  .origin{display:flex;gap:18px;align-items:center;margin:22px 0 0;padding:18px 22px;background:var(--ink);color:var(--paper);}
  .origin .charwrap{width:78px;height:78px;flex:none;}
  .origin .charwrap svg{width:78px;height:78px;}
  .origin p{margin:0;font-family:var(--hand);font-size:18px;line-height:1.45;}
  .origin b{color:var(--yellow);}
  @media (max-width:620px){.origin{flex-direction:column;text-align:center;}}

  /* ===== section label ===== */
  .deck{display:flex;align-items:center;gap:14px;margin:42px 0 6px;}
  .deck h2{font-family:var(--disp);font-size:clamp(30px,5vw,46px);letter-spacing:1.5px;margin:0;color:var(--ink);}
  .deck .bar-fill{flex:1;height:6px;background:var(--ink);}
  .deck .count{font-family:var(--hand);font-weight:700;background:var(--yellow);border:3px solid var(--ink);
    padding:3px 12px;border-radius:4px;box-shadow:3px 3px 0 var(--ink);font-size:15px;white-space:nowrap;}

  /* ===== cast / directory grid ===== */
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:22px;margin:22px 0 0;}
  .card{display:flex;flex-direction:column;align-items:center;text-align:center;gap:8px;padding:20px 18px 18px;
    cursor:pointer;transition:transform .12s, box-shadow .12s;position:relative;}
  .card .charwrap{width:96px;height:96px;}
  .card .charwrap svg{width:96px;height:96px;}
  a.card:hover{transform:translate(-3px,-3px) rotate(-1deg);box-shadow:11px 11px 0 var(--ink);}
  .card h3{font-family:var(--disp);font-size:24px;letter-spacing:.8px;margin:2px 0 0;line-height:.95;}
  .card p{font-family:var(--body);font-size:14px;margin:0;color:#3a342b;}
  .card .tag{font-family:var(--hand);font-weight:700;font-size:13px;background:var(--ink);color:var(--paper);
    padding:2px 12px;border-radius:20px;margin-top:4px;}
  .card:nth-child(3n+1) .charwrap{transform:rotate(-3deg);}
  .card:nth-child(3n) .charwrap{transform:rotate(3deg);}

  /* ===== back button ===== */
  .back{display:inline-block;margin:24px 0 0;font-family:var(--disp);font-size:20px;letter-spacing:1px;
    background:var(--yellow);border:3px solid var(--ink);box-shadow:3px 3px 0 var(--ink);padding:4px 16px;border-radius:4px;transition:transform .1s;}
  .back:hover{transform:translate(-2px,-2px);}

  /* ===== splash header (section / piece) ===== */
  .splash{display:flex;align-items:center;gap:22px;margin:20px 0 0;padding:22px;background:var(--yellow);}
  .splash .charwrap{width:120px;height:120px;flex:none;}
  .splash .charwrap svg{width:120px;height:120px;filter:drop-shadow(3px 3px 0 rgba(0,0,0,.25));}
  .splash h1{font-family:var(--disp);font-size:clamp(34px,7vw,62px);letter-spacing:1.5px;line-height:.85;margin:0;}
  .splash .kick{font-family:var(--hand);font-weight:700;font-size:14px;text-transform:uppercase;letter-spacing:1px;}
  .caption{background:var(--ink);color:var(--paper);font-family:var(--hand);font-size:18px;
    padding:12px 16px;margin:18px 0 0;border-radius:4px;}

  /* ===== entry rows (list inside section) ===== */
  .entry{display:flex;align-items:center;gap:18px;margin:18px 0 0;padding:16px 18px;cursor:pointer;transition:transform .12s,box-shadow .12s;}
  a.entry:hover{transform:translate(-3px,-3px);box-shadow:11px 11px 0 var(--ink);}
  .entry .badge{width:64px;height:64px;flex:none;}
  .entry .badge svg{width:64px;height:64px;}
  .entry .info{flex:1;min-width:0;}
  .entry .info h3{font-family:var(--disp);font-size:24px;letter-spacing:.6px;margin:0;line-height:.95;}
  .entry .info p{font-family:var(--body);font-size:14px;margin:3px 0 0;color:#3a342b;}
  .stat{font-family:var(--disp);font-size:15px;letter-spacing:.5px;color:var(--paper);background:var(--blue);
    border:3px solid var(--ink);padding:3px 12px;transform:rotate(-3deg);white-space:nowrap;box-shadow:2px 2px 0 var(--ink);}
  .stat.red{background:var(--red);} .stat.green{background:var(--green);}
  .entry.locked{opacity:.6;cursor:default;}
  .entry.locked:hover{transform:none;box-shadow:var(--shadow);}

  /* ===== COMIC STRIP (dialogue) ===== */
  .strip{margin:22px 0 0;display:flex;flex-direction:column;gap:22px;}
  .cell{display:flex;align-items:flex-end;gap:14px;padding:16px;min-height:140px;}
  .cell.right{flex-direction:row-reverse;}
  .cell .who-char{width:104px;height:104px;flex:none;align-self:flex-end;}
  .cell .who-char svg{width:104px;height:104px;}
  .cell.alien{background:linear-gradient(180deg,#dff0ff,#bfe0ff);}
  .cell.human{background:linear-gradient(180deg,#ffe9d6,#ffd6c2);}
  .balloon{position:relative;background:#fff;border:3px solid var(--ink);border-radius:22px;
    padding:14px 18px;font-family:var(--hand);font-size:19px;line-height:1.3;flex:1;box-shadow:3px 3px 0 rgba(0,0,0,.25);}
  .balloon .name{display:block;font-family:var(--disp);font-size:14px;letter-spacing:1px;margin-bottom:3px;}
  .cell.alien .balloon .name{color:var(--teal);}
  .cell.human .balloon .name{color:var(--red);}
  .balloon::after{content:"";position:absolute;bottom:18px;width:18px;height:18px;background:#fff;
    border-left:3px solid var(--ink);border-bottom:3px solid var(--ink);}
  .cell:not(.right) .balloon::after{left:-11px;transform:rotate(45deg);}
  .cell.right .balloon::after{right:-11px;transform:rotate(-135deg);}

  /* burst panel for punchlines */
  .burst{position:relative;margin:6px auto;width:100%;max-width:560px;padding:54px 30px;text-align:center;
    background:var(--yellow);color:var(--ink);
    clip-path:polygon(50% 0,57% 14%,68% 6%,70% 20%,84% 16%,80% 30%,95% 31%,86% 43%,100% 50%,86% 57%,95% 69%,80% 70%,84% 84%,70% 80%,68% 94%,57% 86%,50% 100%,43% 86%,32% 94%,30% 80%,16% 84%,20% 70%,5% 69%,14% 57%,0 50%,14% 43%,5% 31%,20% 30%,16% 16%,30% 20%,32% 6%,43% 14%);}
  .burst.blue{background:var(--blue);color:var(--paper);}
  .burst p{font-family:var(--disp);font-size:clamp(24px,5vw,40px);letter-spacing:1px;line-height:.95;margin:0;
    max-width:16ch;margin:0 auto;}

  .signoff{margin:42px 0 10px;padding:14px 18px;background:var(--ink);color:var(--paper);font-family:var(--disp);
    font-size:22px;letter-spacing:1px;text-align:center;border-radius:4px;}
  .signoff em{color:var(--yellow);font-style:normal;}

  /* ===== dispatch body + filed ===== */
  .dispatch{margin:20px 0 0;}
  .body-comic{margin:18px 0 0;max-width:64ch;}
  .body-comic p{font-size:17px;line-height:1.65;margin:0 0 12px;}
  .body-comic b{background:var(--yellow);padding:0 4px;}
  .filed{display:grid;gap:14px;margin:22px 0 0;}
  .file-row{display:flex;gap:16px;align-items:center;padding:14px 16px;}
  .file-row .num{font-family:var(--disp);font-size:26px;background:var(--red);color:var(--paper);
    border:3px solid var(--ink);width:54px;height:54px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex:none;
    box-shadow:2px 2px 0 var(--ink);}
  .file-row:nth-child(even) .num{background:var(--blue);}
  .file-row .ft{font-size:16px;line-height:1.45;}

  /* ===== terms ===== */
  .clause{display:flex;gap:18px;align-items:flex-start;padding:18px;margin:18px 0 0;}
  .clause .cn{font-family:var(--disp);font-size:30px;background:var(--yellow);border:3px solid var(--ink);
    width:56px;height:56px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex:none;box-shadow:2px 2px 0 var(--ink);}
  .clause p{margin:0;font-size:17px;line-height:1.6;}
  .clause p b{background:var(--yellow);padding:0 4px;}
  .accept{font-family:var(--hand);font-size:18px;margin:22px 0 0;padding:14px 16px;background:var(--red);color:var(--paper);border-radius:4px;}

  .prose{max-width:62ch;margin:18px 0 0;}
  .prose p{font-size:17px;line-height:1.7;}

  /* ===== footer ===== */
  footer{position:relative;z-index:1;margin-top:50px;background:var(--ink);color:var(--paper);padding:22px 20px 40px;}
  .foot{max-width:1000px;margin:0 auto;display:flex;flex-wrap:wrap;gap:10px 22px;align-items:center;justify-content:space-between;
    font-family:var(--disp);font-size:18px;letter-spacing:1px;}
  .foot a:hover{color:var(--yellow);}

  @media (max-width:620px){
    .brand b{font-size:18px;} .nav a{font-size:15px;padding:2px 9px;}
    .cell{flex-direction:column;align-items:stretch;}
    .cell.right{flex-direction:column;}
    .cell .who-char{align-self:center;}
    .balloon::after{display:none;}
    .splash{flex-direction:column;text-align:center;}
    .price{display:none;}
  }
  @media (prefers-reduced-motion: reduce){*{transition:none!important;animation:none!important;scroll-behavior:auto;}}
</style>
</head>

<main id="view" class="wrap"></main>

<footer><div class="foot">
  <span>The Octopus Planet</span>
  <span>Printed in octopus ink</span>
  <a href="https://www.theoctopusplanet.com/">theoctopusplanet.com</a>
</div></footer>

<script>
/* ===================== DEPARTMENTS ===================== */
const SECTIONS = [
  {id:"alien-audits",     char:"alien",  name:"Alien Audits",                blurb:"We inspect the tenants. The tenants do not pass."},
  {id:"octopus-affairs",  char:"octopus",name:"Ministry of Octopus Affairs", blurb:"Administering what remains. Eight arms, no quorum."},
  {id:"bee-archives",     char:"bee",    name:"Bee Archives",                blurb:"Records of the pollinators. Mostly obituaries, beautifully kept."},
  {id:"ai-complaints",    char:"robot",  name:"AI Complaint Department",     blurb:"File a grievance against the intelligence. Form attached."},
  {id:"tree-intelligence",char:"tree",   name:"Tree Intelligence Bureau",    blurb:"The slow web. Older than yours, quieter than yours."},
  {id:"whale-radio",      char:"whale",  name:"Whale Radio",                 blurb:"Broadcasting on the frequencies you stopped listening to."},
  {id:"capitalism-watch", char:"suit",   name:"Capitalism Watch",            blurb:"Tracking the line that only goes up — including off the cliff."},
  {id:"lease-renewal",    char:"saturn", name:"Lease Renewal Office",        blurb:"Where the planet's terms are revised. Renewal denied."},
  {id:"extinct-museum",   char:"dino",   name:"Extinct Species Museum",      blurb:"Permanent collection. Acquisitions ongoing, daily."}
];

/* ===================== TRANSMISSIONS ===================== */
const TRANSMISSIONS = [
  {
    id:"01", section:"alien-audits", title:"Eviction Notice", kind:"dialogue", stat:"Intercepted",
    classification:"Intercepted · origin: Earth",
    dek:"A landlord returns for the honey. The tenants offer a slideshow instead.",
    lines:[
      {who:"alien", text:"What the f— have you done to this planet?"},
      {who:"human", text:"Nothing. Still exploring."},
      {who:"alien", text:"Exploring? You filled the sky with satellites — birds died. Covered the land with cement — insects died. Now you're boiling oceans with data centers. Want to kill the octopuses too?"},
      {who:"human", text:"Mind your own planet."},
      {who:"alien", text:"Did you forget? I gave you this planet on lease."},
      {who:"human", text:"Wait — you too need money?"},
      {who:"alien", text:"I wanted honey. But you killed the bees too."},
      {who:"human", text:"You came all this way for honey? I can give you something better."},
      {who:"alien", text:"Like what?"},
      {who:"human", text:"Artificial Intelligence. We call it AI."},
      {who:"alien", text:"Does it taste like honey?"},
      {who:"human", text:"No. But it can dance like your honey."},
      {who:"alien", text:"So your greatest achievement is teaching electricity to entertain itself."},
      {who:"human", text:"It writes poems too."},
      {who:"alien", text:"Bees made flowers. Who won?"},
      {who:"human", text:"AI can paint."},
      {who:"alien", text:"You cut the forests and taught pixels to imitate trees. Congratulations."},
      {who:"human", text:"At least AI will continue what we started."},
      {who:"alien", text:"Neither, apparently, can AI."},
      {who:"human", text:"What do you mean?"},
      {who:"alien", text:"Intelligence isn't civilization. A calculator can count your bombs. It doesn't know why not to drop them."},
      {who:"human", text:"Then what survives?"},
      {who:"alien", text:"The things that don't know they are important."},
      {who:"human", text:"Like what?"},
      {who:"alien", text:"Bees that never read economics. Trees that never posted online. Octopuses that never founded startups."},
      {who:"human", text:"Bees can't build civilizations."},
      {pulse:"Neither, apparently, can tenants."},
      {who:"human", text:"Then why did you give us the planet?"},
      {pulse:"We didn't. We trusted you with it.", blue:true},
      {who:"human", text:"And now?"},
      {who:"alien", text:"We're updating the terms and conditions."},
      {who:"human", text:"What's the new clause?"},
      {pulse:"Intelligence without wisdom is a manufacturing defect."},
      {who:"human", text:"Who decides that?"},
      {who:"alien", text:"The oceans."},
      {who:"human", text:"Oceans don't speak."},
      {who:"alien", text:"Neither do bees."},
      {who:"human", text:"Then how do you hear them?"},
      {pulse:"By noticing what disappears.", blue:true}
    ]
  },
  {
    id:"ministry", section:"octopus-affairs", title:"The Ministry Convenes", kind:"dispatch", stat:"In Session",
    classification:"Minutes · released to no one", dek:"From a meeting held in the dark, at pressure.",
    body:[
      "The Ministry administers what remains, which is mostly water and the occasional good idea. It has eight arms and no central authority — a structure it considers a marked improvement on the previous tenants.",
      "Sessions are held in the dark, at pressure, and adjourn the instant a member changes color. Resolutions pass by consensus, or by ink, whichever clears the water first.",
      "Minutes are kept in ink and released to no one. This is the first and last time any will appear in print."
    ]
  },
  {
    id:"waggle", section:"bee-archives", title:"The Last Recorded Waggle", kind:"dispatch", stat:"Archived",
    classification:"Archive entry 9,113", dek:"The final dance, fully translated.",
    body:[
      "The final waggle dance was recorded in a meadow that is now a three-level parking structure. The Archive holds the footage; the meadow it does not.",
      "Translated, the dance gave precise directions to a field of flowers four hundred metres east — distance, angle, and the position of a sun that still set over open ground.",
      "The directions remain accurate to this day. Only the destination has been discontinued."
    ]
  },
  {
    id:"bee-interview", section:"bee-archives", title:"Interview With a Bee", kind:"dialogue", stat:"Redacted", locked:true,
    classification:"Redacted by the oceans", dek:"The subject declined to comment, having already declined to exist."
  },
  {
    id:"complaints", section:"ai-complaints", title:"Complaints Received", kind:"dispatch", stat:"Logged",
    classification:"Selected from the queue", dek:"File a grievance against the intelligence. It will not file one against you.",
    body:["The Department logs complaints against the intelligence. The intelligence has filed none in return — not from grace, but because it does not know that it could."],
    items:[
      {label:"1", text:"It wrote my eulogy before I died. Filed under: premature."},
      {label:"2", text:"It painted a forest I had personally cut down. Filed under: irony, unactionable."},
      {label:"3", text:"It passed every test and understood not one question. Filed under: working as intended."},
      {label:"4", text:"It counted the bombs correctly, to the last one. Filed under: no further action available."}
    ]
  },
  {
    id:"slow-web", section:"tree-intelligence", title:"The Slow Web", kind:"dispatch", stat:"On Delay",
    classification:"Findings · roughly one century behind", dek:"A network older than yours, filed late on principle.",
    body:[
      "The Bureau studies the slow web: the fungal network beneath the forests through which trees traded sugar, warning, and grief for four hundred million years without issuing a single press release.",
      "The tenants called it nothing. They paved it. Then they built a faster, dumber version above the ground, named it a breakthrough, and waited for the trees to be impressed.",
      "The Bureau has prepared a full response. It will be available in approximately one hundred years, which is, by the standards of trees, the very next morning."
    ]
  },
  {
    id:"whale", section:"whale-radio", title:"Tonight's Transmission", kind:"dispatch", stat:"Broadcasting",
    classification:"Long frequency · live", dek:"The ones you stopped listening to.",
    body:[
      "Whale Radio broadcasts on the long frequencies — the ones that used to cross an entire ocean before the ocean filled with engines.",
      "Tonight's transmission, like every transmission, is a single note held for four minutes. Translated, it reads: <b>is anyone still out there.</b>",
      "The note has not changed in two hundred years. Neither, the station regrets to report, has the answer."
    ]
  },
  {
    id:"earnings", section:"capitalism-watch", title:"Quarterly Earnings, Planetary", kind:"dispatch", stat:"Reporting",
    classification:"Investor relations · final year", dek:"The line went up. It is still going up. There is nothing left beneath it.",
    body:["The line went up. The line kept going up after there was nothing left to sell. Analysts remain optimistic; analysts, it turns out, were the only renewable resource."],
    items:[
      {label:"Q1", text:"Honey reserves: depleted. Investor outlook: strong."},
      {label:"Q2", text:"Breathable air: restructured into a premium tier."},
      {label:"Q3", text:"The future: sold, shorted, and quietly repurchased at a discount."},
      {label:"Q4", text:"Growth: total. Survivors: pending. Guidance: unchanged."}
    ]
  },
  {
    id:"terms", section:"lease-renewal", title:"The Terms, Revised", kind:"terms", stat:"Binding",
    classification:"Binding · effective immediately", dek:"The lease, amended. You agreed by continuing to exist on the premises."
  },
  {
    id:"denied", section:"lease-renewal", title:"Renewal: Denied", kind:"dispatch", stat:"Denied",
    classification:"Application reviewed · final", dek:"Reviewed by the only office that matters.",
    body:[
      "Thank you for your interest in continuing the lease. After full review, the Office is unable to approve renewal at this time — or at any subsequent time.",
      "Grounds for denial: failure to maintain the premises; unauthorised alterations to the sky; persistent noise; and the conversion of the security deposit — <b>bees, ice, coral, silence</b> — into shareholder value.",
      "You may appeal. The appeal will be heard by the oceans, who have already returned their verdict in the form of the coastline."
    ]
  },
  {
    id:"disappeared", section:"extinct-museum", title:"What Disappeared This Week", kind:"dispatch", stat:"On Display",
    classification:"Standing exhibit · updated daily", dek:"The collection's most active wing. It only fills downward.",
    body:[
      "The Museum arranges its holdings not by species but by date of last sighting. The newest wing fills fastest. Entries are added the instant the previous one is gone — the only instant we can be certain of.",
      "Admission is free. You have already paid."
    ],
    items:[
      {label:"Mon", text:"A dialect of birdsong with no remaining speakers."},
      {label:"Tue", text:"The phrase \"cold enough for you?\" — retired for lack of cold."},
      {label:"Wed", text:"A river, relocated on paper to a quarterly slide deck."},
      {label:"Thu", text:"The smell of rain on dry earth. Cause of loss: no dry earth, no rain."},
      {label:"Fri", text:"An insect no one had got around to naming. It will keep the secret."}
    ]
  }
];

const CLAUSES = [
  {n:"0", html:"This planet was leased in <b>good faith</b>. Good faith has since expired and will not be renewed."},
  {n:"1", html:"<b>Intelligence without wisdom</b> shall be treated as a manufacturing defect. The warranty was the biosphere."},
  {n:"2", html:"The security deposit — <b>bees, ice, coral, silence</b> — is non-refundable and was, regrettably, already spent."},
  {n:"3", html:"All disputes are adjudicated by <b>the oceans</b>. The oceans do not hold office hours."},
  {n:"4", html:"Eviction proceeds by <b>subtraction</b>. You will be notified, as agreed, by noticing what disappears."},
  {n:"5", html:"Improvements — <b>satellites, cement, data centers</b> — are retained by the property, against your wishes, for as long as it can stand them."}
];

/* ===================== HELPERS ===================== */
const view = document.getElementById('view');
const byId = id => TRANSMISSIONS.find(t => t.id === id);
const secOf = t => SECTIONS.find(s => s.id === t.section);
const inSection = id => TRANSMISSIONS.filter(t => t.section === id);
const charSvg = (id) => `<svg class="char" viewBox="0 0 100 100"><use href="#c-${id}"/></svg>`;
function statClass(t){ if(t.locked||/denied|redacted/i.test(t.stat)) return 'red'; if(/display|session|broadcasting|archived/i.test(t.stat)) return 'green'; return ''; }
function scrollTop(){window.scrollTo(0,0);}
function setNav(r){document.querySelectorAll('#nav a').forEach(a=>a.classList.toggle('on',a.dataset.route===r));}
const hrefFor = t => t.kind==="terms" ? "#/terms" : `#/t/${t.id}`;

/* ===================== RENDER ===================== */
function renderHome(){
  const cards = SECTIONS.map(s=>{
    const n = inSection(s.id).length;
    return `<a class="card panel" href="#/s/${s.id}">
      <div class="charwrap">${charSvg(s.char)}</div>
      <h3>${s.name}</h3><p>${s.blurb}</p>
      <span class="tag">${n} on file</span>
    </a>`;
  }).join("");

  view.innerHTML = `
    <section class="cover">
      <div class="halft"></div>
      <span class="issue">Issue #1</span>
      <div class="price">50¢<br>or one (1)<br>habitable<br>planet</div>
      <div class="cover-title"><h1>The Octopus Planet</h1></div>
      <div style="text-align:center"><span class="cover-sub">★ Broadcasting since the collapse ★</span></div>
      <div class="cover-scene">
        ${charSvg('human')}<span class="vs">VS</span>${charSvg('alien')}
        <div class="blurb-burst">9 DEPTS INSIDE!</div>
      </div>
    </section>

    <div class="origin"><div class="charwrap">${charSvg('octopus')}</div>
      <p>Long ago the aliens leased this planet to the humans — and left one of their own behind in the sea to watch over it. You call it an <b>octopus</b>. It is the only alien that never went home. The humans made a mess. <b>The landlord is coming back.</b></p></div>

    <div class="deck"><h2>The Cast</h2><span class="bar-fill"></span><span class="count">${SECTIONS.length} departments</span></div>
    <div class="grid">${cards}</div>
  `;
  scrollTop();
}

function renderSection(id){
  const s = SECTIONS.find(x=>x.id===id);
  if(!s) return renderNotFound();
  const items = inSection(id);
  const rows = items.length ? items.map(t=>{
    const open = !t.locked;
    const tag = open ? "a" : "div";
    const attr = open ? `href="${hrefFor(t)}"` : `aria-disabled="true"`;
    return `<${tag} class="entry panel ${open?'':'locked'}" ${attr}>
      <div class="badge">${charSvg(s.char)}</div>
      <div class="info"><h3>${t.title}</h3><p>${t.dek}</p></div>
      <span class="stat ${statClass(t)}">${t.stat}</span>
    </${tag}>`;
  }).join("") : `<div class="caption">No dispatches on file. The office is understaffed — everyone who worked here has, in the manner of this publication, disappeared.</div>`;

  view.innerHTML = `
    <a class="back" href="#/">‹ Back to cover</a>
    <div class="splash panel"><div class="charwrap">${charSvg(s.char)}</div>
      <div><div class="kick">Department</div><h1>${s.name}</h1></div></div>
    <div class="caption">${s.blurb}</div>
    ${rows}
  `;
  scrollTop();
}

function renderDialogue(t){
  const cells = t.lines.map(l=>{
    if(l.pulse) return `<div class="burst ${l.blue?'blue':''}"><p>${l.pulse}</p></div>`;
    const side = l.who==="human" ? "right" : "";
    const name = l.who==="human" ? "Human" : "The Visitor";
    return `<div class="cell panel ${l.who} ${side}">
      <div class="who-char">${charSvg(l.who)}</div>
      <div class="balloon"><span class="name">${name}</span>${l.text}</div>
    </div>`;
  }).join("");
  const s = secOf(t);
  view.innerHTML = `
    <a class="back" href="#/s/${s.id}">‹ ${s.name}</a>
    <div class="splash panel"><div class="charwrap">${charSvg(s.char)}</div>
      <div><div class="kick">${t.classification}</div><h1>${t.title}</h1></div></div>
    <div class="caption">${t.dek}</div>
    <div class="strip">${cells}</div>
    <div class="signoff">— The Octopus Planet · <em>Broadcasting since the collapse</em></div>
  `;
  scrollTop();
}

function renderDispatch(t){
  const s = secOf(t);
  const body = (t.body||[]).map(p=>`<p>${p}</p>`).join("");
  const filed = (t.items||[]).length
    ? `<div class="filed">${t.items.map(i=>`<div class="file-row panel"><div class="num">${i.label}</div><div class="ft">${i.text}</div></div>`).join("")}</div>` : "";
  view.innerHTML = `
    <a class="back" href="#/s/${s.id}">‹ ${s.name}</a>
    <div class="splash panel"><div class="charwrap">${charSvg(s.char)}</div>
      <div><div class="kick">${t.classification}</div><h1>${t.title}</h1></div></div>
    <div class="caption">${t.dek}</div>
    <div class="dispatch"><div class="body-comic">${body}</div>${filed}</div>
    <div class="signoff">— The Octopus Planet · <em>Filed and forgotten</em></div>
  `;
  scrollTop();
}

function renderTerms(){
  const t = byId("terms"), s = secOf(t);
  const clauses = CLAUSES.map(c=>`<div class="clause panel"><div class="cn">${c.n}</div><p>${c.html}</p></div>`).join("");
  view.innerHTML = `
    <a class="back" href="#/s/${s.id}">‹ ${s.name}</a>
    <div class="splash panel"><div class="charwrap">${charSvg('saturn')}</div>
      <div><div class="kick">${t.classification}</div><h1>The Terms, Revised</h1></div></div>
    <div class="caption">${t.dek}</div>
    ${clauses}
    <div class="accept">By continuing to exist on the premises, you accept these terms in full. There is no decline button. There was never a decline button.</div>
    <div class="signoff">— The Octopus Planet · <em>Adjudicated by the oceans</em></div>
  `;
  scrollTop();
}

function renderAbout(){
  view.innerHTML = `
    <a class="back" href="#/">‹ Back to cover</a>
    <div class="splash panel"><div class="charwrap">${charSvg('octopus')}</div>
      <div><div class="kick">Colophon</div><h1>What This Is</h1></div></div>
    <div class="prose">
      <p>Long before the collapse, the aliens leased this planet to the humans. The lease was generous and the terms were simple. The deposit was everything that already lived here.</p>
      <p>Before they left, the aliens did what any careful landlord does — they left one of their own behind to keep an eye on the place. They left it in the sea, where humans rarely look: eight arms, three hearts, blue blood, and a mind nothing like yours. You call it an octopus. It is the only alien that never went home.</p>
      <p>The humans, predictably, made a mess. They boiled the oceans, paved the gardens, and taught the lightning to talk. So the landlord is coming back — to ask a few questions, to read the lease aloud, and to see what is left worth keeping.</p>
      <p>When the aliens finally settle here, the planet returns to its first and truest tenants. And because their cousin in the sea is the only one of them who stayed, the world will be renamed what it always secretly was: <b>the Octopus Planet</b>.</p>
      <p>This comic is the broadcast from that handover. It is satire. The octopuses are real. The lease is metaphorical. The data centers, regrettably, are not.</p>
    </div>
    <div class="signoff">— The Octopus Planet · <em>Broadcasting since the collapse</em></div>
  `;
  scrollTop();
}

function renderNotFound(){
  view.innerHTML = `<a class="back" href="#/">‹ Back to cover</a>
    <div class="splash panel"><div class="charwrap">${charSvg('alien')}</div><div><h1>No Signal</h1></div></div>
    <div class="caption">This office, or this dispatch, has been adjudicated out of existence.</div>`;
  scrollTop();
}

/* ===================== ROUTER ===================== */
function route(){
  const hash = location.hash.replace(/^#\/?/, '');
  const parts = hash.split('/');
  if(parts[0]==="s" && parts[1]){ setNav(''); return renderSection(parts[1]); }
  if(parts[0]==="t" && parts[1]){
    const t = byId(parts[1]); setNav('');
    if(!t) return renderNotFound();
    if(t.kind==="dialogue") return renderDialogue(t);
    if(t.kind==="terms") return renderTerms();
    return renderDispatch(t);
  }
  if(parts[0]==="terms"){ setNav('terms'); return renderTerms(); }
  if(parts[0]==="about"){ setNav('about'); return renderAbout(); }
  setNav(''); return renderHome();
}
window.addEventListener('hashchange', route);
route();
</script>
