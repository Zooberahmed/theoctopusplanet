<!DOCTYPE html>
<html lang="en">

<meta name="description" content="Earth leased to humans. Lease currently under review. An interspecies comic broadcast from a collapsed future — alien auditors, octopus ministers, and the last bee, reviewing humanity's performance.">

<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="THE PLANET OCTOPUS">
<meta name="twitter:description" content="Earth leased to humans. Lease currently under review.">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='%239d6bff'/%3E%3Cpath fill='%230a0a0f' d='M50 16c-15 0-25 11-25 26 0 6 2 11 5 15-3 2-6 6-8 11-2 4-7 5-10 4-2 0-2 3 0 4 5 2 11 1 15-3 1 4 4 7 8 9-3 3-5 7-5 12 0 3 3 3 4 0 2-4 5-7 9-8 2 1 4 1 7 1s5 0 7-1c4 1 7 4 9 8 1 3 4 3 4 0 0-5-2-9-5-12 4-2 7-5 8-9 4 4 10 5 15 3 2-1 2-4 0-4-3 1-8 0-10-4-2-5-5-9-8-11 3-4 5-9 5-15 0-15-10-26-25-26z'/%3E%3C/svg%3E">
<link href="https://fonts.googleapis.com/css2?family=Bangers&family=IBM+Plex+Mono:ital,wght@0,400;0,500;0,600;1,400&family=Patrick+Hand&display=swap" rel="stylesheet">
<style>
  :root{
    --void:#0a0a0f; --void2:#13131d; --panel:#1a1a26;
    --paper:#ECE3CF; --paper2:#DCCFB0; --ink:#15110c;
    --purple:#9d6bff; --purple-deep:#6c3bd1; --cyan:#2fe6e6; --red:#ff4438; --yellow:#ffe14d; --green:#5fd97a;
    --txt:#E7E3D6; --dim:#8a86a0;
    --disp:'Bangers', system-ui, cursive; --mono:'IBM Plex Mono', ui-monospace, monospace; --hand:'Patrick Hand', cursive;
  }
  *{box-sizing:border-box;}
  html{scroll-behavior:smooth;}
  body{margin:0;background:var(--void);color:var(--txt);font-family:var(--mono);font-size:15px;line-height:1.55;
    -webkit-font-smoothing:antialiased;overflow-x:hidden;}
  /* starfield + vignette */
  body::before{content:"";position:fixed;inset:0;z-index:0;pointer-events:none;
    background:
      radial-gradient(1px 1px at 20% 30%, #fff6, transparent),
      radial-gradient(1px 1px at 70% 60%, #fff5, transparent),
      radial-gradient(1px 1px at 40% 80%, #fff4, transparent),
      radial-gradient(1px 1px at 85% 20%, #fff6, transparent),
      radial-gradient(1200px 600px at 50% -10%, rgba(157,107,255,.18), transparent 70%),
      radial-gradient(900px 500px at 90% 110%, rgba(47,230,230,.10), transparent 70%);}
  a{color:inherit;text-decoration:none;}
  ::selection{background:var(--purple);color:#fff;}
  :focus-visible{outline:3px solid var(--cyan);outline-offset:3px;}
  svg{display:block;}
  .wrap{position:relative;z-index:2;max-width:1080px;margin:0 auto;padding:0 18px;}

  /* ===== ambient floating creatures ===== */
  #ambient{position:fixed;inset:0;z-index:1;pointer-events:none;overflow:hidden;}
  #ambient .f{position:absolute;opacity:.5;}
  .tentacle-l{left:-40px;bottom:-30px;width:240px;color:var(--purple);opacity:.35;animation:sway 9s ease-in-out infinite;}
  .tentacle-r{right:-40px;top:-30px;width:220px;color:var(--purple-deep);opacity:.3;transform:scaleY(-1) rotate(8deg);animation:sway 11s ease-in-out infinite reverse;}
  .sat{top:12%;left:-60px;width:60px;color:var(--cyan);animation:cross 26s linear infinite;}
  .bee1{top:30%;width:30px;color:var(--yellow);animation:zig 18s linear infinite;}
  .bee2{top:68%;width:24px;color:var(--yellow);animation:zig 24s linear infinite;animation-delay:-6s;}
  .fish1{bottom:18%;left:-50px;width:46px;color:var(--cyan);opacity:.4;animation:cross 34s linear infinite;animation-delay:-10s;}
  @keyframes sway{0%,100%{transform:rotate(-4deg);}50%{transform:rotate(6deg);}}
  .tentacle-r{}
  @keyframes cross{from{transform:translateX(0);}to{transform:translateX(108vw);}}
  @keyframes zig{0%{transform:translate(-6vw,0);}25%{transform:translate(28vw,-40px);}50%{transform:translate(56vw,20px);}75%{transform:translate(84vw,-30px);}100%{transform:translate(112vw,10px);}}
  .glitch-bar{position:fixed;left:0;right:0;height:2px;background:var(--cyan);opacity:0;z-index:1;mix-blend-mode:screen;animation:glitch 7s infinite;}
  @keyframes glitch{0%,96%,100%{opacity:0;top:30%;}96.5%{opacity:.7;top:42%;}97%{opacity:0;}98%{opacity:.6;top:61%;}98.4%{opacity:0;}}

  /* ===== top bar ===== */
  .bar{position:relative;z-index:6;max-width:1080px;margin:14px auto 0;padding:9px 14px;display:flex;align-items:center;justify-content:space-between;gap:8px;
    background:linear-gradient(90deg,var(--void2),var(--panel));border:2px solid var(--purple-deep);border-radius:6px;flex-wrap:wrap;}
  .brand{display:flex;align-items:center;gap:9px;}
  .brand svg{width:30px;height:30px;}
  .brand b{font-family:var(--disp);font-size:21px;letter-spacing:1.5px;color:var(--purple);text-shadow:0 0 12px rgba(157,107,255,.5);}
  .nav{display:flex;gap:6px;flex-wrap:wrap;}
  .nav a{font-family:var(--mono);font-weight:600;font-size:11.5px;letter-spacing:1px;text-transform:uppercase;color:var(--cyan);
    border:1px solid #2c2c40;padding:4px 9px;border-radius:4px;transition:.12s;}
  .nav a:hover,.nav a.on{background:var(--cyan);color:var(--void);border-color:var(--cyan);}

  #view{min-height:60vh;padding-bottom:30px;}

  /* ===== generic comic panel (paper) ===== */
  .paper{background:var(--paper);color:var(--ink);border:3px solid #000;box-shadow:6px 6px 0 #000, 0 0 0 1px var(--purple-deep);position:relative;}
  .char{stroke:var(--ink);}

  /* ===== COVER ===== */
  .cover{position:relative;margin:22px 0 0;padding:34px 22px 30px;border:4px solid #000;border-radius:4px;overflow:hidden;
    background:radial-gradient(120% 120% at 50% 0%, #241a44, #0c0c14 70%);box-shadow:0 0 0 2px var(--purple),0 0 40px rgba(157,107,255,.25);}
  .cover .dots{position:absolute;inset:0;opacity:.12;background-image:radial-gradient(var(--purple) 1.5px,transparent 2px);background-size:18px 18px;}
  .flash{position:absolute;top:-3px;left:18px;background:var(--red);color:#fff;font-family:var(--disp);font-size:18px;letter-spacing:1px;padding:7px 14px 5px;border:3px solid #000;border-top:none;box-shadow:3px 3px 0 #000;z-index:3;}
  .seal{position:absolute;top:14px;right:14px;width:92px;height:92px;border-radius:50%;border:3px dashed var(--cyan);color:var(--cyan);display:flex;align-items:center;justify-content:center;text-align:center;
    font-family:var(--mono);font-weight:600;font-size:10px;letter-spacing:1px;text-transform:uppercase;transform:rotate(-12deg);padding:8px;z-index:3;}
  .cover h1{position:relative;z-index:2;font-family:var(--disp);text-align:center;margin:24px 0 0;line-height:.82;letter-spacing:2px;
    font-size:clamp(48px,12vw,120px);color:var(--purple);
    text-shadow:4px 4px 0 #000, -2px -2px 0 var(--cyan), 0 0 30px rgba(157,107,255,.6);}
  .cover .sub{position:relative;z-index:2;text-align:center;font-family:var(--disp);font-size:clamp(18px,3.6vw,28px);letter-spacing:1px;color:var(--yellow);margin:10px 0 0;}
  .cover .type{position:relative;z-index:2;text-align:center;font-family:var(--mono);color:var(--cyan);margin:14px auto 0;min-height:22px;font-size:14px;letter-spacing:.5px;border-right:2px solid var(--cyan);display:inline-block;}
  .cover .typewrap{text-align:center;}
  .cover-scene{position:relative;z-index:2;display:flex;align-items:flex-end;justify-content:center;gap:14px;margin:22px 0 0;}
  .vs-card{background:var(--paper);border:3px solid #000;box-shadow:4px 4px 0 #000;padding:8px;border-radius:6px;}
  .vs-card svg{width:clamp(82px,18vw,128px);height:clamp(82px,18vw,128px);}
  .vs-card .cap{font-family:var(--disp);text-align:center;font-size:14px;letter-spacing:1px;color:var(--ink);margin-top:2px;}
  .vs{font-family:var(--disp);font-size:clamp(34px,7vw,60px);color:var(--red);align-self:center;transform:rotate(-8deg);text-shadow:2px 2px 0 #000;}

  /* ===== section deck label ===== */
  .deck{display:flex;align-items:center;gap:12px;margin:46px 0 4px;}
  .deck h2{font-family:var(--disp);font-size:clamp(26px,4.5vw,40px);letter-spacing:1.5px;margin:0;color:var(--purple);text-shadow:0 0 14px rgba(157,107,255,.4);}
  .deck .line{flex:1;height:3px;background:repeating-linear-gradient(90deg,var(--purple-deep) 0 10px,transparent 10px 16px);}

  /* ===== WIDGETS dashboard ===== */
  .widgets{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:18px;margin:20px 0 0;}
  .w{padding:16px;border-radius:4px;}
  .w-title{font-family:var(--disp);font-size:18px;letter-spacing:1px;color:var(--red);margin:0 0 10px;display:flex;align-items:center;gap:8px;}
  .w.term{background:#0c0f0c;border:2px solid var(--green);color:var(--green);font-family:var(--mono);box-shadow:0 0 18px rgba(95,217,122,.15) inset;}
  .w.term .w-title{color:var(--green);}
  .w.term .row{display:flex;justify-content:space-between;border-bottom:1px dashed #1f3a24;padding:4px 0;font-size:13px;}
  .w.warn{background:var(--paper);color:var(--ink);border:3px solid var(--red);box-shadow:5px 5px 0 #000;}
  .w.warn ul{margin:0;padding:0;list-style:none;}
  .w.warn li{font-family:var(--mono);font-size:12.5px;padding:6px 0;border-bottom:1px solid #00000022;display:flex;gap:8px;}
  .w.warn li::before{content:"▲";color:var(--red);}
  .w.sticky{background:var(--yellow);color:#3a2f00;border:none;box-shadow:5px 6px 14px #0008;transform:rotate(-1.5deg);font-family:var(--hand);}
  .w.sticky .w-title{color:#7a5c00;font-family:var(--disp);}
  .w.sticky ol{margin:0;padding-left:20px;font-size:16px;line-height:1.35;}
  .w.card{background:var(--paper);color:var(--ink);border:3px solid #000;box-shadow:5px 5px 0 var(--purple-deep);}
  .grade{font-family:var(--disp);font-size:64px;line-height:1;color:var(--red);text-align:center;text-shadow:2px 2px 0 #000;}
  .gradesub{text-align:center;font-family:var(--mono);font-size:11px;letter-spacing:1px;text-transform:uppercase;color:#7a2218;}
  .meter{height:14px;background:#00000018;border:2px solid #000;margin-top:10px;position:relative;overflow:hidden;}
  .meter i{display:block;height:100%;background:repeating-linear-gradient(45deg,var(--red) 0 8px,#c0271d 8px 16px);}
  .report .row{display:flex;justify-content:space-between;font-family:var(--mono);font-size:13px;padding:3px 0;border-bottom:1px dotted #0003;}
  .report .g{font-family:var(--disp);font-size:18px;color:var(--red);}
  .report .g.good{color:#1a8f3a;}
  .species .row{display:flex;align-items:center;gap:8px;font-family:var(--mono);font-size:12px;padding:4px 0;}
  .species .bar{flex:1;height:9px;background:#0002;border:1px solid #000;}
  .species .bar i{display:block;height:100%;background:var(--red);}
  .species .s{font-weight:600;color:#7a2218;min-width:74px;text-align:right;}
  .w.trans{background:var(--panel);border:2px solid var(--cyan);color:var(--txt);}
  .w.trans .w-title{color:var(--cyan);}
  .w.trans a{display:flex;justify-content:space-between;gap:8px;padding:6px 0;border-bottom:1px solid #ffffff14;font-family:var(--mono);font-size:12.5px;}
  .w.trans a:hover{color:var(--cyan);}
  .w.trans .dep{color:var(--purple);font-size:11px;}

  /* ===== departments grid ===== */
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:18px;margin:20px 0 0;}
  .dept{display:flex;flex-direction:column;align-items:center;text-align:center;gap:7px;padding:18px 16px;border-radius:4px;transition:.12s;cursor:pointer;}
  .dept .ic{width:84px;height:84px;}
  .dept .ic svg{width:84px;height:84px;}
  a.dept:hover{transform:translate(-3px,-3px) rotate(-1deg);box-shadow:10px 10px 0 #000,0 0 0 1px var(--cyan);}
  .dept .emo{font-size:22px;}
  .dept h3{font-family:var(--disp);font-size:21px;letter-spacing:.6px;margin:0;line-height:.95;color:var(--ink);}
  .dept p{font-size:12.5px;margin:0;color:#473f30;font-family:var(--mono);}
  .dept .tag{font-family:var(--hand);font-size:14px;background:#000;color:var(--yellow);padding:1px 12px;border-radius:14px;}

  /* ===== character cards ===== */
  .cast{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:18px;margin:20px 0 0;}
  .ccard{padding:0;border-radius:6px;overflow:hidden;background:var(--paper);border:3px solid #000;box-shadow:6px 6px 0 var(--purple-deep);}
  .ccard .top{background:linear-gradient(135deg,var(--purple),var(--purple-deep));padding:14px;text-align:center;border-bottom:3px solid #000;}
  .ccard .top svg{width:96px;height:96px;margin:0 auto;filter:drop-shadow(3px 3px 0 #0006);}
  .ccard .bot{padding:12px 14px;color:var(--ink);}
  .ccard h4{font-family:var(--disp);font-size:22px;letter-spacing:.6px;margin:0;line-height:1;}
  .ccard .role{font-family:var(--mono);font-size:11px;color:var(--purple-deep);text-transform:uppercase;letter-spacing:1px;margin:3px 0 8px;}
  .ccard p{font-family:var(--hand);font-size:16px;margin:0;line-height:1.25;}

  /* ===== back btn ===== */
  .back{display:inline-block;margin:22px 0 0;font-family:var(--disp);font-size:18px;letter-spacing:1px;color:var(--void);background:var(--cyan);border:2px solid #000;box-shadow:3px 3px 0 #000;padding:4px 14px;border-radius:4px;}
  .back:hover{transform:translate(-2px,-2px);}

  /* ===== splash / article header ===== */
  .splash{display:flex;align-items:center;gap:20px;margin:18px 0 0;padding:20px;border-radius:4px;}
  .splash .ic{width:108px;height:108px;flex:none;}
  .splash .ic svg{width:108px;height:108px;}
  .splash .kick{font-family:var(--mono);font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:var(--purple-deep);}
  .splash h1{font-family:var(--disp);font-size:clamp(30px,6.5vw,58px);letter-spacing:1px;line-height:.85;margin:4px 0 0;color:var(--ink);}
  .dek{font-family:var(--hand);font-size:19px;background:var(--yellow);color:#3a2f00;display:inline-block;padding:6px 14px;margin:16px 0 0;transform:rotate(-1deg);box-shadow:3px 4px 10px #0007;}

  /* decorations */
  .stamp{position:absolute;font-family:var(--disp);font-size:26px;letter-spacing:2px;color:var(--red);border:4px solid var(--red);padding:4px 12px;border-radius:6px;
    transform:rotate(-14deg);opacity:.85;text-transform:uppercase;top:14px;right:14px;pointer-events:none;background:#fff3;}
  .note{font-family:var(--hand);font-size:18px;background:var(--yellow);color:#3a2f00;padding:12px 14px;box-shadow:4px 5px 12px #0008;transform:rotate(1.4deg);max-width:340px;margin:18px 0 0;}
  .warnbar{margin:18px 0 0;background:repeating-linear-gradient(45deg,#000 0 14px,var(--yellow) 14px 28px);padding:4px;border-radius:3px;}
  .warnbar span{display:block;background:var(--void);color:var(--yellow);font-family:var(--mono);font-weight:600;text-transform:uppercase;letter-spacing:1px;font-size:12px;padding:6px 10px;text-align:center;}

  /* report body */
  .report-body{margin:18px 0 0;padding:20px;border-radius:4px;}
  .report-body p{font-family:var(--mono);font-size:14px;line-height:1.7;color:var(--ink);margin:0 0 12px;}
  .report-body b{background:var(--cyan);padding:0 3px;}
  .filed{display:grid;gap:12px;margin:18px 0 0;}
  .frow{display:flex;gap:14px;align-items:center;padding:12px 14px;border-radius:4px;}
  .frow .n{font-family:var(--disp);font-size:22px;background:var(--purple);color:#fff;border:3px solid #000;width:48px;height:48px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex:none;box-shadow:2px 2px 0 #000;}
  .frow:nth-child(even) .n{background:var(--red);}
  .frow .t{font-family:var(--mono);font-size:13.5px;color:var(--ink);}

  /* dialogue strip */
  .strip{display:flex;flex-direction:column;gap:20px;margin:20px 0 0;}
  .cell{display:flex;align-items:flex-end;gap:12px;padding:14px;border-radius:4px;}
  .cell.right{flex-direction:row-reverse;}
  .cell .wc{width:96px;height:96px;flex:none;}
  .cell .wc svg{width:96px;height:96px;}
  .cell{border:3px solid #000;box-shadow:5px 5px 0 #000;}
  .cell.spk-a{background:linear-gradient(180deg,#1f2440,#12152e);}
  .cell.spk-b{background:linear-gradient(180deg,#33231a,#1f140d);}
  .balloon{position:relative;background:var(--paper);color:var(--ink);border:3px solid #000;border-radius:18px;padding:13px 16px;font-family:var(--hand);font-size:18px;line-height:1.3;flex:1;}
  .balloon .nm{display:block;font-family:var(--disp);font-size:13px;letter-spacing:1px;margin-bottom:2px;}
  .cell.spk-a .nm{color:var(--purple-deep);} .cell.spk-b .nm{color:#b3401f;}
  .balloon::after{content:"";position:absolute;bottom:16px;width:16px;height:16px;background:var(--paper);border-left:3px solid #000;border-bottom:3px solid #000;}
  .cell:not(.right) .balloon::after{left:-10px;transform:rotate(45deg);}
  .cell.right .balloon::after{right:-10px;transform:rotate(-135deg);}
  .burst{position:relative;margin:8px auto;width:100%;max-width:560px;padding:50px 28px;text-align:center;background:var(--yellow);color:var(--ink);
    clip-path:polygon(50% 0,57% 14%,68% 6%,70% 20%,84% 16%,80% 30%,95% 31%,86% 43%,100% 50%,86% 57%,95% 69%,80% 70%,84% 84%,70% 80%,68% 94%,57% 86%,50% 100%,43% 86%,32% 94%,30% 80%,16% 84%,20% 70%,5% 69%,14% 57%,0 50%,14% 43%,5% 31%,20% 30%,16% 16%,30% 20%,32% 6%,43% 14%);}
  .burst.cy{background:var(--cyan);}
  .burst p{font-family:var(--disp);font-size:clamp(22px,5vw,38px);letter-spacing:1px;line-height:.95;margin:0 auto;max-width:16ch;}

  /* clauses / terms */
  .clause{display:flex;gap:16px;align-items:flex-start;padding:16px;margin:16px 0 0;border-radius:4px;}
  .clause .cn{font-family:var(--disp);font-size:26px;background:var(--cyan);border:3px solid #000;width:50px;height:50px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex:none;box-shadow:2px 2px 0 #000;}
  .clause p{margin:0;font-family:var(--mono);font-size:14px;line-height:1.6;color:var(--ink);}
  .clause b{background:var(--yellow);padding:0 3px;}

  .stat{font-family:var(--disp);font-size:14px;letter-spacing:.5px;color:#fff;background:var(--purple);border:3px solid #000;padding:3px 11px;transform:rotate(-3deg);white-space:nowrap;box-shadow:2px 2px 0 #000;}
  .stat.red{background:var(--red);} .stat.green{background:#1a8f3a;}

  .entry{display:flex;align-items:center;gap:16px;margin:16px 0 0;padding:14px 16px;border-radius:4px;cursor:pointer;transition:.12s;}
  a.entry:hover{transform:translate(-3px,-3px);box-shadow:10px 10px 0 #000;}
  .entry .badge{width:60px;height:60px;flex:none;}
  .entry .badge svg{width:60px;height:60px;}
  .entry .info{flex:1;min-width:0;}
  .entry .info h3{font-family:var(--disp);font-size:22px;letter-spacing:.5px;margin:0;line-height:.95;color:var(--ink);}
  .entry .info p{font-family:var(--mono);font-size:12.5px;margin:3px 0 0;color:#473f30;}
  .entry.locked{opacity:.6;cursor:default;}
  .entry.locked:hover{transform:none;box-shadow:6px 6px 0 #000,0 0 0 1px var(--purple-deep);}

  .signoff{margin:42px 0 10px;padding:13px 16px;background:linear-gradient(90deg,var(--purple-deep),var(--purple));color:#fff;font-family:var(--disp);font-size:20px;letter-spacing:1px;text-align:center;border-radius:4px;border:2px solid #000;}

  /* ===== footer ===== */
  footer{position:relative;z-index:2;margin-top:54px;background:#060609;border-top:3px solid var(--purple-deep);padding:26px 18px 44px;}
  .foot{max-width:1080px;margin:0 auto;text-align:center;}
  .foot .stk{font-family:var(--disp);font-size:clamp(20px,4vw,30px);color:var(--purple);letter-spacing:1px;}
  .foot p{font-family:var(--mono);font-size:12px;color:var(--dim);margin:6px 0;line-height:1.7;}
  .foot a{color:var(--cyan);}

  @media (max-width:600px){
    .brand b{font-size:17px;} .nav a{font-size:10px;padding:3px 6px;}
    .cell{flex-direction:column;} .cell.right{flex-direction:column;} .balloon::after{display:none;}

const byId = id => TRANSMISSIONS.find(t => t.id === id);
const secOf = t => SECTIONS.find(s => s.id === t.section);
const inSection = id => TRANSMISSIONS.filter(t => t.section === id);
const ch = id => `<svg class="char" viewBox="0 0 100 100"><use href="#c-${id}"/></svg>`;
function statClass(t){ if(t.locked||/denied|redacted/i.test(t.stat)) return 'red'; if(/display|session|broadcasting|archived/i.test(t.stat)) return 'green'; return ''; }
function setNav(r){document.querySelectorAll('#nav a').forEach(a=>a.classList.toggle('on',a.dataset.route===r));}
function toTop(){window.scrollTo(0,0);}
const hrefFor = t => t.kind==="terms" ? "#/terms" : `#/t/${t.id}`;
const STAMPS = {classified:"Classified", "lease-renewal":"Past Due", "ai-complaints":"Logged", "extinct-museum":"Deceased", "capitalism-watch":"Audited", "alien-audits":"Reviewed"};
const NOTES = ["the oceans already know.","do NOT show the humans.","filed under: too late.","approved by no one in particular.","reviewed twice. wept once."];
const reduce = matchMedia('(prefers-reduced-motion: reduce)').matches;

/* ===================== RENDER ===================== */
function widgets(){
  const latest = TRANSMISSIONS.filter(t=>!t.locked).slice(-5).reverse().map(t=>{
    const s=secOf(t)||{};
    return `<a href="${hrefFor(t)}"><span>${t.title}</span><span class="dep">${s.emoji||''}</span></a>`;
  }).join("");
  return `<div class="widgets">
    <div class="w card paper"><div class="w-title">⚖️ Earth Lease Score</div>
      <div class="grade">F</div><div class="gradesub">8 / 100 · Past Due 200,000 yrs</div>
      <div class="meter"><i style="width:8%"></i></div></div>
    <div class="w card paper report"><div class="w-title">📋 Humanity Performance Index</div>
      ${REPORT.map(r=>`<div class="row"><span>${r[0]}</span><span class="g ${r[2]?'good':''}">${r[1]}</span></div>`).join("")}
      <div class="row" style="border:none"><span><b>Remark</b></span><span style="font-family:var(--hand);font-size:15px">see us after class</span></div></div>
    <div class="w warn"><div class="w-title">🚨 Breaking Incidents</div>
      <ul>${INCIDENTS.map(i=>`<li>${i}</li>`).join("")}</ul></div>
    <div class="w sticky"><div class="w-title">📌 Top Complaints vs. Humanity</div>
      <ol>${TOP_COMPLAINTS.map(c=>`<li>${c}</li>`).join("")}</ol></div>
    <div class="w card paper species"><div class="w-title">🧬 Endangered Species Status</div>
      ${SPECIES.map(s=>`<div class="row"><span style="min-width:62px">${s.n}</span><span class="bar"><i style="width:${s.p}%"></i></span><span class="s">${s.s}</span></div>`).join("")}</div>
    <div class="w trans"><div class="w-title">📡 Latest Transmissions</div>${latest||'<div style="font-size:12px;color:var(--dim)">loading…</div>'}</div>
  </div>`;
}

function renderHome(){
  const depts = SECTIONS.map(s=>{
    const n=inSection(s.id).length;
    return `<a class="dept paper" href="#/s/${s.id}"><div class="ic">${ch(s.char)}</div>
      <div class="emo">${s.emoji}</div><h3>${s.name}</h3><p>${s.blurb}</p><span class="tag">${n} on file</span></a>`;
  }).join("");
  const cast = CAST.map(c=>castCard(c)).join("");
  view.innerHTML = `
    <section class="cover">
      <div class="dots"></div>
      <span class="flash">Issue #1</span>
      <span class="seal">Ministry of<br>Tentacles<br>★ Approved ★</span>
      <h1>THE PLANET OCTOPUS</h1>
      <div class="sub">Broadcasting Since The Collapse</div>
      <div class="typewrap"><span class="type" id="tw"></span></div>
      <div class="cover-scene">
        <div class="vs-card">${ch('human')}<div class="cap">Humanity</div></div>
        <span class="vs">VS</span>
        <div class="vs-card">${ch('alien')}<div class="cap">The Landlord</div></div>
      </div>
    </section>

    <div class="deck"><h2>The Control Room</h2><span class="line"></span></div>
    ${widgets()}

    <div class="deck"><h2>Departments</h2><span class="line"></span></div>
    <div class="grid">${depts}</div>

    <div class="deck"><h2>The Cast</h2><span class="line"></span></div>
    <div class="cast">${cast}</div>
  `;
  setNav(''); toTop();
  // typewriter
  const tw=document.getElementById('tw'), msg="Earth leased to humans. Lease currently under review.";
  if(reduce){ tw.textContent=msg; tw.style.borderRight='none'; }
  else { let i=0; (function t(){ if(i<=msg.length){ tw.textContent=msg.slice(0,i++); setTimeout(t,42);} })(); }
}

function castCard(c){
  return `<div class="ccard"><div class="top">${ch(c.char)}</div>
    <div class="bot"><h4>${c.name}</h4><div class="role">${c.role}</div><p>${c.bio}</p></div></div>`;
}
function renderCast(){
  view.innerHTML = `<a class="back" href="#/">‹ Cover</a>
    <div class="deck"><h2>The Cast</h2><span class="line"></span></div>
    <div class="cast">${CAST.map(castCard).join("")}</div>`;
  setNav('cast'); toTop();
}

function renderSection(id){
  const s=SECTIONS.find(x=>x.id===id); if(!s) return renderNotFound();
  const items=inSection(id);
  const rows = items.length ? items.map(t=>{
    const open=!t.locked, tag=open?"a":"div", attr=open?`href="${hrefFor(t)}"`:'aria-disabled="true"';
    return `<${tag} class="entry paper ${open?'':'locked'}" ${attr}><div class="badge">${ch(s.char)}</div>
      <div class="info"><h3>${t.title}</h3><p>${t.dek}</p></div><span class="stat ${statClass(t)}">${t.stat}</span></${tag}>`;
  }).join("") : `<div class="note">No dispatches on file yet. This office is understaffed — everyone who worked here has, in the manner of this publication, disappeared.</div>`;
  view.innerHTML = `<a class="back" href="#/">‹ Cover</a>
    <div class="splash paper"><div class="ic">${ch(s.char)}</div><div><div class="kick">${s.emoji} Department</div><h1>${s.name}</h1></div></div>
    <div class="dek">${s.blurb}</div>${rows}`;
  setNav(''); toTop();
}

const SPK_NAME={alien:'The Alien',human:'Humanity',god:'God',ai:'A.I.',robot:'A.I.',octopus:'The Octopus',marx:'Karl Marx'};
const SPK_CHAR={ai:'robot'};
function renderDialogue(t){
  const s=secOf(t);
  const order=[]; t.lines.forEach(l=>{ if(l.who && order.indexOf(l.who)<0) order.push(l.who); });
  const cells=t.lines.map(l=>{
    if(l.pulse) return `<div class="burst ${l.cy?'cy':''}"><p>${l.pulse}</p></div>`;
    const idx=Math.max(0,order.indexOf(l.who)), b=idx%2===1;
    const charId=SPK_CHAR[l.who]||l.who, name=l.name||SPK_NAME[l.who]||l.who;
    return `<div class="cell ${b?'spk-b right':'spk-a'}"><div class="wc">${ch(charId)}</div>
      <div class="balloon"><span class="nm">${name}</span>${l.text}</div></div>`;
  }).join("");
  const kick = t.with ? `${t.classification} · ${t.with}` : t.classification;
  view.innerHTML = `<a class="back" href="#/s/${s.id}">‹ ${s.name}</a>
    <div class="splash paper">${stamp(t)}<div class="ic">${ch(s.char)}</div><div><div class="kick">${kick}</div><h1>${t.title}</h1></div></div>
    <div class="dek">${t.dek}</div>
    <div class="strip">${cells}</div>
    ${note(t)}
    <div class="signoff">— The Planet Octopus · Broadcasting since the collapse</div>`;
  setNav(''); toTop();
}

function renderDispatch(t){
  const s=secOf(t);
  const body=(t.body||[]).map(p=>`<p>${p}</p>`).join("");
  const filed=(t.items||[]).length?`<div class="filed">${t.items.map(i=>`<div class="frow paper"><div class="n">${i.label}</div><div class="t">${i.text}</div></div>`).join("")}</div>`:"";
  view.innerHTML = `<a class="back" href="#/s/${s.id}">‹ ${s.name}</a>
    <div class="splash paper">${stamp(t)}<div class="ic">${ch(s.char)}</div><div><div class="kick">${t.classification}</div><h1>${t.title}</h1></div></div>
    <div class="dek">${t.dek}</div>
    <div class="report-body paper">${body}</div>${filed}
    ${note(t)}
    <div class="warnbar"><span>Issued by the ${s.name} · unauthorised reading is encouraged</span></div>
    <div class="signoff">— The Planet Octopus · Filed and forgotten</div>`;
  setNav(''); toTop();
}

function stamp(t){ const txt=STAMPS[t.section]; return txt?`<div class="stamp">${txt}</div>`:''; }
function note(t){ const i=(t.id||'').length % NOTES.length; return `<div class="note">✎ ${NOTES[i]}</div>`; }

function renderTerms(){
  const t=byId("terms"), s=secOf(t);
  const cl=CLAUSES.map(c=>`<div class="clause paper"><div class="cn">${c.n}</div><p>${c.html}</p></div>`).join("");
  view.innerHTML = `<a class="back" href="#/s/${s.id}">‹ ${s.name}</a>
    <div class="splash paper"><div class="stamp">Binding</div><div class="ic">${ch('saturn')}</div><div><div class="kick">${t.classification}</div><h1>The Terms, Revised</h1></div></div>
    <div class="dek">${t.dek}</div>${cl}
    <div class="note">By continuing to exist on the premises, you accept these terms in full. There is no decline button. There was never a decline button.</div>
    <div class="signoff">— The Planet Octopus · Adjudicated by the oceans</div>`;
  setNav('terms'); toTop();
}

function renderAbout(){
  view.innerHTML = `<a class="back" href="#/">‹ Cover</a>
    <div class="splash paper"><div class="ic">${ch('octopus')}</div><div><div class="kick">Colophon</div><h1>What This Is</h1></div></div>
    <div class="report-body paper">
      <p>Long before the collapse, the aliens leased this planet to the humans. The lease was generous; the terms were simple. The deposit was everything that already lived here.</p>
      <p>Before they left, the aliens did what any careful landlord does — they left one of their own behind to watch the place. They left it in the sea, where humans rarely look: eight arms, three hearts, blue blood, a mind nothing like yours. You call it an octopus. It is the only alien that never went home.</p>
      <p>The humans, predictably, made a mess. So the landlord is coming back — to ask a few questions and read the lease aloud. When the aliens settle here again, the planet returns to its first tenants, and is renamed what it always secretly was: <b>The Planet Octopus</b>.</p>
      <p>This comic is the broadcast from that handover. It is satire. The octopuses are real. The lease is metaphorical. The data centers, regrettably, are not.</p>
    </div>
    <div class="signoff">— The Planet Octopus · Broadcasting since the collapse</div>`;
  setNav('about'); toTop();
}

function renderNotFound(){
  view.innerHTML = `<a class="back" href="#/">‹ Cover</a>
    <div class="splash paper"><div class="ic">${ch('alien')}</div><div><h1>No Signal</h1></div></div>
    <div class="dek">This office, or this dispatch, has been adjudicated out of existence.</div>`;
  toTop();
}

/* ===================== ROUTER ===================== */
function route(){
  const h=location.hash.replace(/^#\/?/,''), p=h.split('/');
  if(p[0]==="s"&&p[1]) return renderSection(p[1]);
  if(p[0]==="t"&&p[1]){ const t=byId(p[1]); if(!t) return renderNotFound(); if(t.kind==="dialogue") return renderDialogue(t); if(t.kind==="terms") return renderTerms(); return renderDispatch(t); }
  if(p[0]==="cast") return renderCast();
  if(p[0]==="terms") return renderTerms();
  if(p[0]==="about") return renderAbout();
  return renderHome();
}
window.addEventListener('hashchange', route);

/* ---- load editable content from Pages CMS (posts + conversations) ---- */
function slugify(s){return String(s||'').toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-+|-+$/g,'').slice(0,48)||'post';}
function toParas(t){return Array.isArray(t)?t:String(t||'').split(/\n\s*\n/).map(x=>x.trim()).filter(Boolean);}
function grab(url,key){return fetch(url,{cache:'no-store'}).then(r=>r.ok?r.json():{}).then(d=>d[key]||[]).catch(()=>[]);}
Promise.all([grab('posts.json','posts'), grab('conversations.json','conversations')])
  .then(([posts,convos])=>{
    const dispatches=posts.filter(p=>p&&p.title&&p.section).map(p=>({
      id:p.id||slugify(p.title), section:p.section, title:p.title, kind:'dispatch',
      stat:p.stat||'Filed', classification:p.classification||'', dek:p.dek||'',
      body:toParas(p.body), items:(p.items||[]).filter(i=>i&&(i.label||i.text))
    }));
    const talks=convos.filter(c=>c&&c.title&&(c.lines||[]).length).map(c=>({
      id:c.id||slugify(c.title), section:c.section||'alien-audits', title:c.title, kind:'dialogue',
      stat:c.stat||'Intercepted', classification:c.classification||'Conversation', dek:c.dek||'', with:c.with||'',
      lines:(c.lines||[]).filter(l=>l&&l.text).map(l=> l.big ? {pulse:l.text} : {who:l.speaker||'alien', text:l.text})
    }));
    TRANSMISSIONS = SPECIALS.concat(dispatches, talks);
  })
  .catch(()=>{ TRANSMISSIONS = SPECIALS.slice(); })
  .finally(()=>route());
</script>
</body>
</html>
